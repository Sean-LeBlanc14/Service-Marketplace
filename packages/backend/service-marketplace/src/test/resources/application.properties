spring.application.name=service-marketplace

spring.mongodb.uri=mongodb://localhost:27017/service_marketplace_test

security.jwt.secret-key=not-a-real-jwt-secret-for-tests-only
security.jwt.expiration-time=3600000

spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test
spring.mail.password=not-used-in-tests
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

custom.app.sender.email=test@example.com

stripe.secret-key=not-used-in-tests
stripe.publishable-key=not-used-in-tests
stripe.webhook-secret=not-used-in-tests
stripe.connect.return-url=http://localhost:5173/profile
stripe.connect.refresh-url=http://localhost:5173/profile
stripe.platform-fee-percent=10
