<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Verification</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f4f4; font-family: Arial, sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" border="0">
    <tr>
      <td align="center" style="padding: 40px 20px;">

        <table width="100%" cellpadding="0" cellspacing="0" border="0" 
               style="max-width: 500px; background-color: #ffffff; border-radius: 8px; padding: 40px;">

          <!-- Header -->
          <tr>
            <td align="center">
              <h1 style="margin: 0; color: #333333;">
                Verify Your Email
              </h1>
            </td>
          </tr>

          <!-- Message -->
          <tr>
            <td style="padding-top: 20px; color: #555555; font-size: 16px; line-height: 24px;">
              Hello,
              <br /><br />
              Thank you for signing up. Use the verification code below to verify your email address.
            </td>
          </tr>

          <!-- Verification Code -->
          <tr>
            <td align="center" style="padding: 30px 0;">
              <div style="
                display: inline-block;
                background-color: #f0f0f0;
                padding: 15px 30px;
                font-size: 32px;
                letter-spacing: 6px;
                font-weight: bold;
                color: #222222;
                border-radius: 6px;
              ">
                <strong>[[${code}]]</strong></p>
              </div>
            </td>
          </tr>

          <!-- Expiration -->
          <tr>
            <td style="color: #777777; font-size: 14px; line-height: 22px;">
              This code will expire in 10 minutes.
              <br /><br />
              If you did not create an account, you can safely ignore this email.
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding-top: 30px; font-size: 12px; color: #999999;">
              © 2026 Service Market Place. All rights reserved.
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
